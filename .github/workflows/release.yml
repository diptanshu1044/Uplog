name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary_name: uplog
            asset_name: uplog-linux-x86_64

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary_name: uplog
            asset_name: uplog-linux-aarch64

          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: uplog
            asset_name: uplog-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: uplog
            asset_name: uplog-macos-aarch64

          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            binary_name: uplog.exe
            asset_name: uplog-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux/Windows builds)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross (Linux/Windows)
        if: matrix.os == 'ubuntu-latest'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build natively (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} \
             dist/${{ matrix.asset_name }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          draft: true
